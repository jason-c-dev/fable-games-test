<title>Sprout Kingdom: Seedrunner</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='13' font-size='13'>🌰</text></svg>">
<style>
/* Sprout Kingdom: Seedrunner — UI overlay styling.
   The game canvas fills the window; all menus/HUD are DOM in #ui. */

html, body {
  margin: 0; padding: 0; width: 100%; height: 100%;
  background: #05070c; overflow: hidden;
  font-family: "Trebuchet MS", "Segoe UI", Verdana, sans-serif;
  -webkit-user-select: none; user-select: none;
}
#game, #game canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
#ui { position: absolute; inset: 0; pointer-events: none; color: #eaf6e4; }
#ui * { box-sizing: border-box; }

#boot-error {
  position: absolute; inset: auto 0 0 0; padding: 12px; z-index: 99;
  background: #300; color: #fbb; font: 12px monospace; white-space: pre-wrap;
}

</style>
